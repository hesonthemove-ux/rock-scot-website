<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wire | ROCK.SCOT</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .wire-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .wire-card { padding: 1.5rem; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.2s; }
        .wire-card:hover { background: #111; }
        .wire-card-genre { color: #ff6b00; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .wire-card-title { font-size: 1.2rem; font-weight: 700; margin: 0.5rem 0; line-height: 1.3; }
        .wire-card-meta { font-size: 0.85rem; color: rgba(255,255,255,0.4); }
        #wire-status-text { color: #ff6b00; font-weight: bold; font-size: 0.9rem; }
        .load-more-btn { width: 100%; padding: 1.2rem; background: #1a1a1a; border: 1px solid #333; color: #ff6b00; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="wire-container">
        <h1 style="color:#ff6b00;">THE WIRE</h1>
        <p style="opacity:0.7;">Real-time Scottish rock news. <span id="wire-status-text">Connecting...</span></p>
        
        <div id="wire-output"></div>
        <div id="wire-loading" style="text-align:center; padding: 2rem;">Loading news feed...</div>
    </div>

<script>
const SUPABASE_URL = 'https://pwzeapvopeeoahpyicdm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3emVhcHZvcGVlb2FocHlpY2RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNjg3NDEsImV4cCI6MjA4Njc0NDc0MX0.rc8IqfQF537UA5iWarxDia174HyCZ_xc2VPWOWdGxYk';

let allStories = [];
let shownCount = 20;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function timeAgo(d) {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}

async function loadStories() {
    const status = document.getElementById('wire-status-text');
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/wire_news?select=*&order=created_at.desc&limit=100', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        allStories = await res.json();
        render();
        if (status) status.textContent = allStories.length + ' Stories Live';
    } catch (e) {
        console.error(e);
        if (status) status.textContent = 'Offline';
    }
}

function render() {
    const out = document.getElementById('wire-output');
    const load = document.getElementById('wire-loading');
    if (load) load.style.display = 'none';
    if (!out) return;

    out.innerHTML = allStories.slice(0, shownCount).map(s => `
        <div class="wire-card" onclick="window.open('${s.source_url}','_blank')">
            <div class="wire-card-genre">${esc(s.genre || 'ROCK')}</div>
            <div class="wire-card-title">${esc(s.title)}</div>
            <div class="wire-card-meta">${esc(s.source_name)} &bull; ${timeAgo(s.created_at)}</div>
        </div>
    `).join('');

    if (allStories.length > shownCount) {
        const btn = document.createElement('button');
        btn.className = 'load-more-btn';
        btn.textContent = 'LOAD MORE STORIES';
        btn.onclick = () => { shownCount += 20; render(); };
        out.appendChild(btn);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadStories();
    setInterval(loadStories, 300000);
});
</script>
</body>
</html>
