<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Presenters | ROCK.SCOT — Scotland's Rock Station</title>
  <meta name="description" content="Meet the DJs and presenters of ROCK.SCOT — Scotland's rock station on DAB+ Digital Radio. 15 voices, one station.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="The Presenters | ROCK.SCOT">
  <meta property="og:image" content="https://rock.scot/assets/images/hero-graffiti-main.jpg">
  <link rel="icon" type="image/png" href="/assets/images/logo.png">
  <meta name="theme-color" content="#dd1111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=13">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #060606; color: #f2f2f2; overflow-x: hidden; }
    .djs-header { position:relative; padding:5rem 2rem 3rem; text-align:center; overflow:hidden; }
    .djs-header::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(221,17,17,0.12) 0%, transparent 70%), repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(221,17,17,0.02) 60px, rgba(221,17,17,0.02) 61px); }
    .djs-header-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:#dd1111; margin-bottom:0.75rem; position:relative; }
    .djs-header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(4rem,12vw,9rem); line-height:0.88; letter-spacing:0.02em; color:#f2f2f2; position:relative; }
    .djs-header h1 span { color:#dd1111; }
    .djs-header-sub { font-family:'Barlow',sans-serif; font-size:1rem; font-weight:300; color:rgba(242,242,242,0.45); margin-top:1rem; position:relative; letter-spacing:0.05em; }
    .djs-count-badge { display:inline-flex; align-items:center; gap:0.5rem; background:rgba(221,17,17,0.1); border:1px solid rgba(221,17,17,0.3); padding:0.35rem 1rem; font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#dd1111; margin-top:1.5rem; position:relative; }
    .djs-count-dot { width:6px; height:6px; background:#dd1111; border-radius:50%; animation:blink 1.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .stage { position:relative; width:100%; padding:2rem 0 4rem; overflow:hidden; }
    .stage-glow { position:absolute; top:30%; left:50%; transform:translateX(-50%); width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(221,17,17,0.15) 0%,transparent 70%); pointer-events:none; }
    .carousel-track { display:flex; align-items:center; gap:0; width:max-content; padding:3rem 0; cursor:grab; user-select:none; will-change:transform; transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
    .carousel-track.dragging { cursor:grabbing; transition:none; }
    .carousel-track.snapping { transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94); }
    .dj-card { position:relative; flex-shrink:0; width:240px; margin:0 12px; cursor:pointer; transform-origin:center bottom; transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1), filter 0.45s ease, opacity 0.45s ease; will-change:transform,filter; transform:scale(0.72) translateY(20px); filter:grayscale(70%) brightness(0.55); opacity:0.7; }
    .dj-card.near { transform:scale(0.86) translateY(10px); filter:grayscale(40%) brightness(0.75); opacity:0.85; }
    .dj-card.active { transform:scale(1.18) translateY(-8px); filter:grayscale(0%) brightness(1.05) drop-shadow(0 20px 60px rgba(221,17,17,0.4)); opacity:1; z-index:10; }
    .dj-card-inner { position:relative; overflow:hidden; background:#0d0d0d; border:1px solid #1a1a1a; }
    .dj-card.active .dj-card-inner { border-color:rgba(221,17,17,0.5); }
    .dj-card-photo { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:top center; display:block; transition:transform 0.6s ease; }
    .dj-card.active .dj-card-photo { transform:scale(1.04); }
    .dj-card-placeholder { width:100%; aspect-ratio:3/4; background:linear-gradient(160deg,#111 0%,#0a0a0a 100%); display:flex; align-items:center; justify-content:center; font-size:4rem; }
    .dj-card-overlay { position:absolute; bottom:0; left:0; right:0; height:65%; background:linear-gradient(to top,rgba(6,6,6,0.98) 0%,rgba(6,6,6,0.7) 40%,transparent 100%); pointer-events:none; }
    .dj-card.active .dj-card-overlay { background:linear-gradient(to top,rgba(6,6,6,1) 0%,rgba(6,6,6,0.75) 40%,transparent 100%); }
    .dj-card-accent { position:absolute; bottom:0; left:0; right:0; height:3px; background:#dd1111; transform:scaleX(0); transform-origin:left; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s; }
    .dj-card.active .dj-card-accent { transform:scaleX(1); }
    .dj-card-info { position:absolute; bottom:0; left:0; right:0; padding:1rem; transform:translateY(4px); transition:transform 0.4s ease; }
    .dj-card.active .dj-card-info { transform:translateY(0); }
    .dj-card-name { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; line-height:1; letter-spacing:0.03em; color:#f2f2f2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dj-card.active .dj-card-name { font-size:1.55rem; }
    .dj-card-show { font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#dd1111; margin-top:0.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0; transform:translateY(6px); transition:opacity 0.3s ease 0.15s,transform 0.3s ease 0.15s; }
    .dj-card.active .dj-card-show { opacity:1; transform:translateY(0); }
    .dj-card-num { position:absolute; top:0.75rem; right:0.75rem; font-family:'Bebas Neue',sans-serif; font-size:1.8rem; line-height:1; color:rgba(255,255,255,0.08); transition:color 0.4s; }
    .dj-card.active .dj-card-num { color:rgba(221,17,17,0.25); }
    .dj-info-panel { max-width:700px; margin:0 auto; padding:0 2rem 2rem; text-align:center; min-height:180px; position:relative; }
    .dj-info-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,6vw,4.5rem); line-height:0.9; color:#f2f2f2; animation:fadeUp 0.4s ease forwards; }
    .dj-info-show { font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#dd1111; margin:0.5rem 0 0.75rem; animation:fadeUp 0.4s ease 0.05s both; }
    .dj-info-genres { display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; margin-bottom:1rem; animation:fadeUp 0.4s ease 0.1s both; }
    .dj-info-genre { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:0.2rem 0.65rem; font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(242,242,242,0.5); }
    .dj-info-bio { font-family:'Barlow',sans-serif; font-size:0.9rem; font-weight:300; line-height:1.7; color:rgba(242,242,242,0.5); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; animation:fadeUp 0.4s ease 0.15s both; }
    .dj-info-cta { display:inline-flex; align-items:center; gap:0.5rem; margin-top:1.25rem; padding:0.7rem 1.75rem; background:#dd1111; color:#f2f2f2; font-family:'Barlow Condensed',sans-serif; font-size:0.8rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; text-decoration:none; transition:background 0.2s,transform 0.2s; animation:fadeUp 0.4s ease 0.2s both; }
    .dj-info-cta:hover { background:#ff2222; transform:translateY(-2px); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .carousel-dots { display:flex; justify-content:center; gap:0.5rem; padding:1rem 0 2rem; }
    .carousel-dot { width:6px; height:6px; border-radius:50%; background:rgba(242,242,242,0.15); cursor:pointer; transition:background 0.3s,transform 0.3s,width 0.3s; border:none; }
    .carousel-dot.active { background:#dd1111; width:24px; border-radius:3px; }
    .carousel-arrows { display:flex; justify-content:center; gap:1rem; margin-top:0.5rem; }
    .carousel-arrow { width:48px; height:48px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:rgba(242,242,242,0.6); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.2s,color 0.2s,background 0.2s,transform 0.2s; }
    .carousel-arrow:hover { border-color:#dd1111; color:#dd1111; background:rgba(221,17,17,0.08); transform:scale(1.05); }
    .djs-loading { min-height:50vh; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.15em; color:rgba(242,242,242,0.15); }
    .djs-grid-section { max-width:1200px; margin:0 auto; padding:3rem 1.5rem 5rem; border-top:1px solid #141414; }
    .djs-grid-label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:#dd1111; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.75rem; }
    .djs-grid-label::after { content:''; flex:1; height:1px; background:rgba(221,17,17,0.2); }
    .djs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1px; background:#111; border:1px solid #111; }
    .djs-grid-card { background:#0a0a0a; text-decoration:none; display:block; overflow:hidden; position:relative; transition:background 0.2s; }
    .djs-grid-card:hover { background:#0f0f0f; }
    .djs-grid-card:hover .djs-grid-photo { transform:scale(1.04); filter:grayscale(0%); }
    .djs-grid-photo { width:100%; aspect-ratio:1; object-fit:cover; object-position:top center; display:block; filter:grayscale(50%); transition:transform 0.4s ease,filter 0.4s ease; }
    .djs-grid-placeholder { width:100%; aspect-ratio:1; background:#0d0d0d; display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
    .djs-grid-hover-bar { position:absolute; bottom:0; left:0; right:0; height:2px; background:#dd1111; transform:scaleX(0); transform-origin:left; transition:transform 0.3s ease; }
    .djs-grid-card:hover .djs-grid-hover-bar { transform:scaleX(1); }
    .djs-grid-info { padding:0.75rem; border-top:1px solid #141414; }
    .djs-grid-name { font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#f2f2f2; }
    .djs-grid-show { font-family:'Barlow',sans-serif; font-size:0.7rem; color:rgba(242,242,242,0.35); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:0.15rem; }
    footer { background:#060606; border-top:1px solid #111; padding:2rem 1.5rem; text-align:center; font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(242,242,242,0.2); }
    @media(max-width:600px) { .dj-card{width:180px;margin:0 8px;} .djs-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));} .dj-info-panel{padding:0 1rem 1.5rem;} }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="djs-header">
  <div class="djs-header-eyebrow">ROCK.SCOT DAB+ Digital Radio</div>
  <h1>THE<br><span>PRESENTERS</span></h1>
  <p class="djs-header-sub">Scotland's rock voices — on air 24/7</p>
  <div class="djs-count-badge"><div class="djs-count-dot"></div><span id="dj-count-label">Loading...</span></div>
</div>
<div id="djs-loading" class="djs-loading">Loading The Roster...</div>
<div id="djs-stage" style="display:none">
  <div class="stage">
    <div class="stage-glow"></div>
    <div class="carousel-track" id="carousel-track"></div>
  </div>
  <div class="dj-info-panel" id="dj-info-panel"></div>
  <div class="carousel-dots" id="carousel-dots"></div>
  <div class="carousel-arrows">
    <button class="carousel-arrow" id="arrow-prev" aria-label="Previous">&#8592;</button>
    <button class="carousel-arrow" id="arrow-next" aria-label="Next">&#8594;</button>
  </div>
  <div class="djs-grid-section">
    <div class="djs-grid-label">Full Roster</div>
    <div class="djs-grid" id="djs-grid"></div>
  </div>
</div>
<footer>© 2025 ROCK.SCOT — Caledonia TX Ltd. Scotland's Rock Station on DAB+ Digital Radio.</footer>
<script>
const SUPABASE_URL='https://pwzeapvopeeoahpyicdm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3emVhcHZvcGVlb2FocHlpY2RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNjg3NDEsImV4cCI6MjA4Njc0NDc0MX0.rc8IqfQF537UA5iWarxDia174HyCZ_xc2VPWOWdGxYk';
let djs=[],activeIndex=0,isDragging=false,trackOffset=0;
const CARD_WIDTH=264;
async function loadDJs(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/djs?is_active=eq.true&order=display_order.asc,name.asc&select=*`,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
    djs=await res.json();
    if(!Array.isArray(djs)||!djs.length)throw new Error('No DJs');
    document.getElementById('dj-count-label').textContent=`${djs.length} Presenters On Air`;
    buildCarousel();buildGrid();
    document.getElementById('djs-loading').style.display='none';
    document.getElementById('djs-stage').style.display='block';
    goTo(0,false);
  }catch(e){document.getElementById('djs-loading').textContent='Could not load presenters.';}
}
function buildCarousel(){
  const track=document.getElementById('carousel-track');
  const dots=document.getElementById('carousel-dots');
  track.innerHTML='';dots.innerHTML='';
  djs.forEach((dj,i)=>{
    const card=document.createElement('div');
    card.className='dj-card';card.dataset.index=i;
    card.innerHTML=`<div class="dj-card-inner">${dj.photo_url?`<img src="${esc(dj.photo_url)}" alt="${esc(dj.name)}" class="dj-card-photo" loading="lazy">`:`<div class="dj-card-placeholder">🎙️</div>`}<div class="dj-card-overlay"></div><div class="dj-card-accent"></div><div class="dj-card-num">${String(i+1).padStart(2,'0')}</div><div class="dj-card-info"><div class="dj-card-name">${esc(dj.name)}</div><div class="dj-card-show">${esc(dj.show_name||'ROCK.SCOT')}</div></div></div>`;
    card.addEventListener('click',()=>goTo(i));
    track.appendChild(card);
    const dot=document.createElement('button');
    dot.className='carousel-dot';dot.setAttribute('aria-label',`Go to ${dj.name}`);
    dot.addEventListener('click',()=>goTo(i));
    dots.appendChild(dot);
  });
  document.getElementById('arrow-prev').addEventListener('click',()=>goTo(activeIndex-1));
  document.getElementById('arrow-next').addEventListener('click',()=>goTo(activeIndex+1));
  setupDrag(track);
}
function goTo(index,animate=true){
  index=Math.max(0,Math.min(djs.length-1,index));
  activeIndex=index;
  const track=document.getElementById('carousel-track');
  const cards=track.querySelectorAll('.dj-card');
  const dots=document.querySelectorAll('.carousel-dot');
  const stageW=window.innerWidth;
  const centreOffset=stageW/2-CARD_WIDTH/2;
  trackOffset=centreOffset-index*CARD_WIDTH;
  if(animate){track.classList.remove('dragging');track.classList.add('snapping');setTimeout(()=>track.classList.remove('snapping'),500);}
  track.style.transform=`translateX(${trackOffset}px)`;
  cards.forEach((card,i)=>{card.classList.remove('active','near');const dist=Math.abs(i-index);if(dist===0)card.classList.add('active');else if(dist===1)card.classList.add('near');});
  dots.forEach((dot,i)=>dot.classList.toggle('active',i===index));
  updateInfo(djs[index]);
}
function updateInfo(dj){
  const panel=document.getElementById('dj-info-panel');
  panel.innerHTML='';void panel.offsetHeight;
  panel.innerHTML=`<div class="dj-info-name">${esc(dj.name)}</div><div class="dj-info-show">${esc(dj.show_name||'ROCK.SCOT Presenter')}</div>${dj.genres&&dj.genres.length?`<div class="dj-info-genres">${dj.genres.map(g=>`<span class="dj-info-genre">${esc(g)}</span>`).join('')}</div>`:''} ${dj.bio?`<p class="dj-info-bio">${esc(dj.bio)}</p>`:''}<a href="dj.html?id=${esc(dj.slug)}" class="dj-info-cta">Full Profile →</a>`;
}
function buildGrid(){
  document.getElementById('djs-grid').innerHTML=djs.map(dj=>`<a href="dj.html?id=${esc(dj.slug)}" class="djs-grid-card">${dj.photo_url?`<img src="${esc(dj.photo_url)}" alt="${esc(dj.name)}" class="djs-grid-photo" loading="lazy">`:`<div class="djs-grid-placeholder">🎙️</div>`}<div class="djs-grid-hover-bar"></div><div class="djs-grid-info"><div class="djs-grid-name">${esc(dj.name)}</div><div class="djs-grid-show">${esc(dj.show_name||'ROCK.SCOT')}</div></div></a>`).join('');
}
function setupDrag(track){
  let startX=0,startOffset=0,moved=false;
  function onStart(x){isDragging=true;moved=false;startX=x;startOffset=trackOffset;track.classList.add('dragging');track.classList.remove('snapping');}
  function onMove(x){if(!isDragging)return;const dx=x-startX;if(Math.abs(dx)>5)moved=true;trackOffset=startOffset+dx;track.style.transform=`translateX(${trackOffset}px)`;}
  function onEnd(x){if(!isDragging)return;isDragging=false;track.classList.remove('dragging');if(!moved)return;const dx=x-startX;let newIndex=activeIndex;if(Math.abs(dx)>40)newIndex+=dx<0?1:-1;goTo(newIndex);}
  track.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX);});
  window.addEventListener('mousemove',e=>onMove(e.clientX));
  window.addEventListener('mouseup',e=>onEnd(e.clientX));
  track.addEventListener('touchstart',e=>onStart(e.touches[0].clientX),{passive:true});
  track.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
  track.addEventListener('touchend',e=>onEnd(e.changedTouches[0].clientX));
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(activeIndex-1);if(e.key==='ArrowRight')goTo(activeIndex+1);});
window.addEventListener('resize',()=>goTo(activeIndex,false));
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
loadDJs();
</script>
<script src="js/header.js" defer></script>
</body>
</html>
