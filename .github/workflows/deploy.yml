name: Deploy ROCK.SCOT to Pi

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Pi — ROCK.SCOT only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Safety check — confirm correct repo
        run: |
          if [ "${{ github.repository }}" != "hesonthemove-ux/rock-scot-website" ]; then
            echo "❌ Wrong repo — aborting"
            exit 1
          fi
          echo "✅ Repo confirmed: ${{ github.repository }}"

      - name: Deploy to Pi via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ROCKSCOT_PI_HOST }}
          username: ${{ secrets.ROCKSCOT_PI_USER }}
          key: ${{ secrets.ROCKSCOT_DEPLOY_KEY }}
          port: 22
          script: |
            set -e

            TARGET="/var/www/html"
            DEPLOY_DIR="$HOME/rockscot-deploy"

            echo "🔍 Confirming deploy target..."
            if grep -q "caledoniatx" "$TARGET/index.html" 2>/dev/null; then
              echo "❌ Wrong site at $TARGET — aborting"
              exit 1
            fi
            echo "✅ Target confirmed: $TARGET"

            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout main
            git pull origin main

            echo "🚀 Syncing to $TARGET..."
            sudo rsync -av \
              --exclude '.git' \
              --exclude '.github' \
              --exclude '*.md' \
              --exclude 'supabase/' \
              --exclude 'ROCKSCOT-MASTER-SETUP.sql' \
              --exclude 'SQL-VALIDATION-REPORT.md' \
              "$DEPLOY_DIR/" "$TARGET/"

            sudo systemctl reload apache2

            echo "✅ ROCK.SCOT deployed"
            echo "   Commit: $(git rev-parse --short HEAD)"
            echo "   Time:   $(date)"
